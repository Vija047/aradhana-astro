# Render Blueprint specification for the entire monorepo.
# Commit this file to the root of your Git repository and deploy via Render Blueprints.
services:
  # 1. Backend Web Service
  - type: web
    name: aradhana-backend
    runtime: node
    plan: starter
    rootDir: backend
    healthCheckPath: /health
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false

  # 2. Frontend Static Site
  - type: static
    name: aradhana-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://aradhana-backend.onrender.com # Update with your actual backend URL after deployment
