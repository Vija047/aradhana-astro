<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Aradhana - Cosmos Shifted</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;family=Playfair+Display:wght@400;500;600&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#e5e2e2",
                        "on-secondary-container": "#342800",
                        "on-tertiary": "#462a00",
                        "on-tertiary-container": "#ac6f00",
                        "surface-bright": "#3a393a",
                        "surface-container-high": "#2a2a2b",
                        "on-primary-container": "#787b8a",
                        "error-container": "#93000a",
                        "on-background": "#e5e2e2",
                        "tertiary-fixed-dim": "#ffb95a",
                        "on-secondary": "#3c2f00",
                        "on-secondary-fixed": "#241a00",
                        "on-error": "#690005",
                        "surface-container": "#201f20",
                        "surface-container-low": "#1c1b1c",
                        "surface-variant": "#353435",
                        "surface-container-highest": "#353435",
                        "tertiary": "#ffb95a",
                        "inverse-primary": "#5a5e6c",
                        "tertiary-fixed": "#ffddb6",
                        "on-surface-variant": "#c7c6cc",
                        "on-tertiary-fixed": "#2a1800",
                        "surface": "#131314",
                        "secondary-fixed-dim": "#e9c349",
                        "surface-tint": "#c3c6d6",
                        "tertiary-container": "#1a0d00",
                        "surface-container-lowest": "#0e0e0f",
                        "on-error-container": "#ffdad6",
                        "secondary": "#e9c349",
                        "error": "#ffb4ab",
                        "on-secondary-fixed-variant": "#574500",
                        "background": "#131314",
                        "primary-fixed": "#dfe2f2",
                        "on-tertiary-fixed-variant": "#643f00",
                        "outline-variant": "#46464c",
                        "primary-container": "#0b0f1a",
                        "primary-fixed-dim": "#c3c6d6",
                        "on-primary": "#2c303c",
                        "primary": "#c3c6d6",
                        "on-primary-fixed": "#171b27",
                        "secondary-container": "#af8d11",
                        "outline": "#909096",
                        "secondary-fixed": "#ffe088",
                        "on-surface": "#e5e2e2",
                        "inverse-on-surface": "#313031",
                        "surface-dim": "#131314",
                        "on-primary-fixed-variant": "#434653"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "48px",
                        "unit": "8px",
                        "container-padding": "24px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Playfair Display"],
                        "label-sm": ["Inter"],
                        "headline-lg-mobile": ["Playfair Display"],
                        "display-lg": ["Playfair Display"],
                        "headline-lg": ["Playfair Display"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "300"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "500"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "1.2", "fontWeight": "500"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "500"}]

                }
            }
        }
    </script>
<style>
        .star-bg {
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255,255,255,0.05) 1px, transparent 1px),
                radial-gradient(circle at 85% 30%, rgba(255,255,255,0.08) 1.5px, transparent 1.5px),
                radial-gradient(circle at 50% 80%, rgba(255,255,255,0.04) 1px, transparent 1px),
                radial-gradient(circle at 70% 60%, rgba(255,255,255,0.06) 2px, transparent 2px),
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100px 100px;
        }
        
        .glass-rose {
            background: linear-gradient(135deg, rgba(255, 180, 171, 0.05) 0%, rgba(255, 180, 171, 0.02) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 180, 171, 0.1);
            box-shadow: 0 0 30px rgba(255, 180, 171, 0.05);
        }
        
        .glow-halo {
            box-shadow: 0 0 40px rgba(233, 195, 73, 0.1);
        }
    .gold-glow-strong { filter: drop-shadow(0 0 12px rgba(233, 195, 73, 0.4)); transition: filter 0.3s ease; } .gold-glow-strong:hover { filter: drop-shadow(0 0 20px rgba(233, 195, 73, 0.6)); }</style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md star-bg overflow-x-hidden selection:bg-secondary/30 selection:text-secondary">
<!-- TopNavBar (Shared Component) -->
<nav class="fixed top-0 w-full z-50 flex justify-between items-center px-container-padding py-4 bg-transparent flat no-shadows">
<div class="font-headline-lg text-headline-lg text-secondary dark:text-secondary gold-glow-strong">
            Aradhana ✦
        </div>
<div class="flex items-center gap-gutter hidden">
<!-- Search hidden as per JSON -->
</div>
<div class="flex items-center">
<button aria-label="Profile" class="text-primary dark:text-primary hover:opacity-80 transition-opacity p-unit flex items-center justify-center rounded-full">
<span class="material-symbols-outlined" data-icon="account_circle" style="font-variation-settings: 'FILL' 0;">account_circle</span>
</button>
</div>
</nav>
<!-- Main Content Canvas (Error State) -->
<main class="flex-grow flex items-center justify-center px-container-padding py-section-gap pt-[100px] relative z-10">
<!-- Ethereal Glow Behind Card -->
<div class="absolute w-[300px] h-[300px] bg-error/5 rounded-full blur-[80px] -z-10 pointer-events-none"></div>
<!-- Glassmorphism Error Card -->
<div class="glass-rose rounded-xl p-section-gap max-w-md w-full flex flex-col items-center text-center transform transition-transform duration-500 hover:scale-[1.01] glow-halo" style="opacity: 1; transform: translateY(0px); transition: opacity 0.8s ease-out, transform 0.8s ease-out;">
<!-- Cosmic Icon -->
<div class="mb-gutter text-error/80 flex items-center justify-center w-16 h-16 rounded-full bg-error/10 border border-error/20">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 0;">error</span>
</div>
<!-- Error Message -->
<h1 class="font-headline-md text-headline-md text-on-surface mb-unit">
                Cosmic Disturbance
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-section-gap max-w-[280px]">
                Something shifted in the cosmos. Please try again.
            </p>
<!-- Ghost Button CTA -->
<button class="font-label-sm text-label-sm text-secondary border border-secondary px-6 py-3 rounded-full hover:bg-secondary/10 transition-colors duration-300 w-full md:w-auto tracking-widest uppercase flex items-center justify-center gap-2 gold-glow-strong" style="box-shadow: 0 0 15px rgba(233, 195, 73, 0.2);">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 0;">refresh</span>
                Retry
            </button>
</div>
</main>
<!-- BottomNavBar (Suppressed as per rules for transactional/error states) -->
<!-- The nav shell is suppressed here because an Error state represents a linear/transactional 
         interruption where the user must focus on resolving the issue before continuing their journey. -->
<script>
        // Simple subtle entrance animation for the card
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.glass-rose');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                card.style.transition = 'opacity 0.8s ease-out, transform 0.8s ease-out';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>


</body></html>
